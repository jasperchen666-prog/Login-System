<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<style>

		body{
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;

			background-image: url('Luffy.gif');
			background-repeat: no-repeat;
			background-size: cover;
			background-position: center;
		}

		#frame_id{
			height: 300px;
			width: 400px;
			background: red;
			opacity: 0.7;
			text-align: center;
		}

		#title_id{
			font-size: 30px;
			color: skyblue;
		}

	</style>
	<script>
		function login(){
			const name = document.getElementById('name_id').value;
			const pass = document.getElementById('pass_id').value;

			if(name == 'Jasper' && pass == 'Chen'){
				location.href = 'FakeNews.html';
			}else {
				alert('Failed');
			}
		}
	</script>
</head>
<body>
	<div id="frame_id">

		<br><br>

		<div id="title_id">Login System</div>

		<br><br>

		<input type="" id="name_id" placeholder="Username">

		<br><br>

		<input type="Password" id="pass_id" placeholder="Password">

		<br><br>

		<button onclick="login()">Login</button>

	</div>

</body>
</html>
